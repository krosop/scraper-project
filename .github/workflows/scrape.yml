name: Daily Scrape + Clean Pipeline (Python + Node.js)

on:
  schedule:
    - cron: "0 0 * * *"  # Every day at midnight UTC
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Algerian PC Stores
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # ─── Node.js Setup (for cleanup + existing scripts) ───
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node.js dependencies
        run: npm install --legacy-peer-deps

      # ─── Python Setup ───
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd scripts/pc-parts-scraper
          pip install -r requirements.txt

      # ─── Run Python Scraper + Adapter ───
      - name: Run Python scraper (licbplus + wifidjelfa)
        run: cd scripts/pc-parts-scraper && python adapter.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # ─── Upload artifacts ───
      - name: Upload results artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: |
            public/clean-products.json
            scripts/pc-parts-scraper/docs/data/
          retention-days: 7

      # ─── Commit updated data ───
      - name: Commit clean data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/clean-products.json server/data/clean-products.json
          git diff --cached --quiet || git commit -m "data: update scraped products $(date -u +%Y-%m-%d)"
          git push

  cleanup:
    name: Cleanup Expired Data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: scrape
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Node.js dependencies
        run: npm install --legacy-peer-deps
      - name: Run cleanup
        run: node scripts/cleanup.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
