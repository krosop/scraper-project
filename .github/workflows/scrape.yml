name: Daily Scrape + Clean Pipeline

on:
  schedule:
    - cron: "0 0 * * *"  # Every day at midnight UTC
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Algerian PC Stores
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run scraper v3 (Scrapling-inspired)
        run: node scripts/scrape-v3.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run deduplication & cleaning
        run: node scripts/clean-products.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Upload results artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: |
            scripts/scrape-results.json
            scripts/clean-products.json
          retention-days: 7

      - name: Commit clean data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/clean-products.json public/scrape-data.json
          git diff --cached --quiet || git commit -m "data: update scraped & cleaned products $(date -u +%Y-%m-%d)"
          git push

  cleanup:
    name: Cleanup Expired Data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: scrape
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Run cleanup
        run: node scripts/cleanup.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
