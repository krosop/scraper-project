name: Scrape Algerian Market

on:
  schedule:
    - cron: '0 0 * * *'     # Once per day at midnight UTC
  workflow_dispatch:        # Manual trigger

jobs:
  scrape-tier-1:
    name: Scrape Tier 1 E-Commerce
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scripts/scrape.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: scripts/scrape-results.json
          retention-days: 7

  cleanup:
    name: Cleanup Expired Data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: scrape-tier-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Run cleanup
        run: node scripts/cleanup.cjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
